<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Night Clock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Roboto','Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation}
#clock-screen{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
#time{font-weight:200;letter-spacing:-0.08em;line-height:1;transition:color 0.6s;text-align:center;width:100%}
#controls{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:14px;opacity:0;transition:opacity 0.4s;z-index:10}
#controls.show{opacity:1}
.btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);padding:7px 16px;border-radius:20px;font-size:12px;font-family:inherit;cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.btn:active{background:rgba(255,255,255,0.15);transform:scale(0.95)}
.btn.active{background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.25)}
#theme-dots{position:fixed;bottom:60px;left:0;right:0;display:flex;justify-content:center;gap:12px;opacity:0;transition:opacity 0.4s}
#brightness{position:fixed;left:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column-reverse;align-items:center;gap:10px;opacity:0;transition:opacity 0.4s}
#brightness.show{opacity:1}
#brightness label{color:rgba(255,255,255,0.35);font-size:11px}
#brightness input[type=range]{width:120px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.15);border-radius:2px;outline:none;transform:rotate(-90deg)}
#brightness input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:rgba(255,255,255,0.4);cursor:pointer}
#theme-dots.show{opacity:1}
.dot{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,0.12);cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.dot:active{transform:scale(0.9)}
.dot.active{border-color:rgba(255,255,255,0.5);box-shadow:0 0 10px rgba(255,255,255,0.08)}
#charge-icon{position:fixed;top:16px;right:18px;opacity:0;transition:opacity 0.4s;color:rgba(255,255,255,0.15);font-size:13px;display:flex;align-items:center;gap:5px}
#charge-icon.on{opacity:1}
#burn-in{transition:transform 10s ease-in-out;display:flex;align-items:center;justify-content:center;width:100%;text-align:center}
</style>
</head>
<body>

<div id="clock-screen">
  <div id="burn-in">
    <div id="time"></div>
  </div>
</div>

<div id="charge-icon">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
  <span id="battery-pct"></span>
</div>

<div id="brightness">
  <label>DIM</label>
  <input type="range" min="5" max="100" value="100" id="bright-slider" oninput="setBrightness(this.value)">
  <label>MAX</label>
</div>

<div id="theme-dots"></div>

<div id="controls">
  <button class="btn" id="btn-24" onclick="toggle24h()">24h</button>
</div>

<script>
const themes=[
  {accent:'#FF2200',dot:'#CC1100'},
  {accent:'#FF9500',dot:'#CC7700'},
  {accent:'#00DD55',dot:'#00AA44'},
  {accent:'#0088FF',dot:'#0066CC'},
  {accent:'#AA66FF',dot:'#8844CC'},
  {accent:'#999999',dot:'#888888'},
];

let currentTheme=0,is24h=true,isCharging=false;
let controlsVisible=false,controlsTimer=null;

const $=id=>document.getElementById(id);
const elTime=$('time'),elClock=$('clock-screen');
const elControls=$('controls'),elDots=$('theme-dots');
const elBtn24=$('btn-24'),elBurnIn=$('burn-in');
const elChargeIcon=$('charge-icon'),elBatteryPct=$('battery-pct');
const elBright=$('brightness'),elBrightSlider=$('bright-slider');

// Called from Android native code
function onNativeCharging(charging, pct){
  isCharging=charging;
  elChargeIcon.classList.toggle('on',isCharging);
  elBatteryPct.textContent=pct+'%';
}

function setBrightness(v){
  elTime.style.opacity=v/100;
  localStorage.setItem('nc_bright',v);
  clearTimeout(controlsTimer);
  controlsTimer=setTimeout(hideCtrls,4000);
}

function initDots(){
  themes.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===currentTheme?' active':'');
    d.style.background=t.dot;
    d.onclick=e=>{e.stopPropagation();setTheme(i)};
    elDots.appendChild(d);
  });
}

function setTheme(i){
  currentTheme=i;
  elTime.style.color=themes[i].accent;
  document.querySelectorAll('.dot').forEach((d,idx)=>d.classList.toggle('active',idx===i));
  localStorage.setItem('nc_theme',i);
}

function updateSize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const size=Math.min(vw/2.8,vh*0.92);
  elTime.style.fontSize=size+'px';
}

function updateClock(){
  const now=new Date();
  let h=now.getHours();
  const m=String(now.getMinutes()).padStart(2,'0');
  if(!is24h){h=h%12||12;elTime.textContent=h+':'+m;}
  else{elTime.textContent=String(h).padStart(2,'0')+':'+m;}
}

function toggle24h(){
  is24h=!is24h;
  elBtn24.textContent=is24h?'24h':'12h';
  elBtn24.classList.toggle('active',!is24h);
  localStorage.setItem('nc_24h',is24h);
  updateClock();
}

function showCtrls(){
  controlsVisible=true;
  elControls.classList.add('show');
  elDots.classList.add('show');
  elBright.classList.add('show');
  clearTimeout(controlsTimer);
  controlsTimer=setTimeout(hideCtrls,4000);
}

function hideCtrls(){
  controlsVisible=false;
  elControls.classList.remove('show');
  elDots.classList.remove('show');
  elBright.classList.remove('show');
}

function burnIn(){
  const x=Math.round(Math.sin(Date.now()/60000)*5);
  const y=Math.round(Math.cos(Date.now()/45000)*3);
  elBurnIn.style.transform='translate('+x+'px,'+y+'px)';
}

document.addEventListener('click',e=>{
  if(e.target.closest('.btn')||e.target.closest('.dot')||e.target.closest('#brightness'))return;
  controlsVisible?hideCtrls():showCtrls();
});
window.addEventListener('resize',updateSize);

const sv=k=>localStorage.getItem(k);
if(sv('nc_theme')!==null)currentTheme=parseInt(sv('nc_theme'));
if(sv('nc_24h')!==null){is24h=sv('nc_24h')==='true';elBtn24.textContent=is24h?'24h':'12h';}

initDots();
elTime.style.color=themes[currentTheme].accent;
const savedBright=sv('nc_bright');
if(savedBright!==null){elBrightSlider.value=savedBright;elTime.style.opacity=savedBright/100;}
updateSize();
updateClock();

function scheduleNextMinute(){
  const now=Date.now();
  const ms=60000-(now%60000)+50;
  setTimeout(()=>{updateClock();scheduleNextMinute();},ms);
}
scheduleNextMinute();
setInterval(burnIn,60000);
</script>
</body>
</html>
